input {
  # Receive JSON logs from Spring Boot services via TCP (logback LogstashTcpSocketAppender)
  tcp {
    port => 5000
    codec => json_lines
  }

  # Receive logs from Filebeat (optional)
  beats {
    port => 5044
  }
}

filter {
  # Parse the timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Normalize log level field name
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "development" }
    add_field => { "project" => "shopping-orchestrator" }
  }

  # Tag ERROR logs for easy filtering
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error", "alert"]
    }
  }

  # Tag WARN logs
  if [level] == "WARN" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # Remove internal Logstash fields to keep index clean
  mutate {
    remove_field => ["@version", "port", "host"]
  }
}

output {
  # Send to Elasticsearch with daily rolling index
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "shopping-orchestrator-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Print to stdout for debugging (remove in production)
  stdout {
    codec => rubydebug
  }
}
