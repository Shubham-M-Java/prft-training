global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'shopping-orchestrator'

scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Eureka Server
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8761']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'eureka-server'

  # API Gateway
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  # Orchestrator Service
  - job_name: 'orchestrator-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'orchestrator-service'

  # Product Research Agent
  - job_name: 'product-research-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'product-research-agent'

  # Comparison Agent
  - job_name: 'comparison-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'comparison-agent'

  # Budget Agent
  - job_name: 'budget-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'budget-agent'

  # Recommendation Agent
  - job_name: 'recommendation-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'recommendation-agent'
